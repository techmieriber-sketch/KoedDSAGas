<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ordkort – tilberedte kødtyper</title>
    <link rel="preload" href="../assets/koed-bg-16x9.png" as="image" />
    <style>
      :root {
        --bg: #0f1115;
        --card: rgba(255, 255, 255, 0.93);
        --card2: rgba(255, 255, 255, 0.97);
        --text: #e9edf5;
        --muted: #b8c0d6;
        --ring: #7aa2ff;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 18px;
      }

      html {
        margin: 0;
        min-height: 100%;
        overflow-y: scroll;
        scrollbar-gutter: stable;
        background: #0f1b24;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f1b24;
        font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: #fff;
        position: relative;
      }
      .bg-media {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: #0f1b24;
        overflow: hidden;
      }
      .bg-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .page-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 2rem;
      }

      header {
        max-width: 1100px;
        margin: 28px auto 10px;
        padding: 0 16px;
        text-align: center;
        position: relative;
      }

      .back-link {
        display: inline-block;
        margin-bottom: 8px;
        color: var(--text);
        text-decoration: underline;
        font-weight: 600;
        position: absolute;
        left: 16px;
        top: 0;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 4px rgba(0, 0, 0, 0.8),
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(22px, 3vw, 30px);
        letter-spacing: 0.2px;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 4px rgba(0, 0, 0, 0.8),
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }

      header p {
        margin: 0 auto;
        color: rgba(255, 255, 255, 0.92);
        max-width: 70ch;
        text-align: center;
        font-weight: 600;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 4px rgba(0, 0, 0, 0.8),
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }

      main {
        max-width: 1100px;
        margin: 18px auto 44px;
        padding: 0 16px;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        align-items: stretch;
        min-height: 50vh;
      }

      .card {
        perspective: 1000px;
        min-height: 320px;
      }

      .inner {
        position: relative;
        height: 100%;
        border-radius: var(--radius);
        transform-style: preserve-3d;
        transition: transform 0.5s ease;
        box-shadow: var(--shadow);
      }

      .card.is-flipped .inner {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        border-radius: var(--radius);
        overflow: hidden;
        backface-visibility: hidden;
        display: grid;
        grid-template-rows: 1fr auto;
        background: linear-gradient(180deg, var(--card) 0%, var(--card2) 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .front {
        background: linear-gradient(
          180deg,
          transparent 0%,
          transparent 78%,
          rgba(255, 255, 255, 0.93) 88%,
          rgba(255, 255, 255, 0.97) 100%
        );
      }

      .front .imgwrap {
        position: relative;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      .front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transform: scale(1.02);
      }

      .label {
        padding: 12px 12px 14px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      .label strong {
        font-size: 16px;
        letter-spacing: 0.2px;
        color: #fff;
        text-shadow:
          -1px -1px 0 rgba(0, 0, 0, 0.8),
          1px -1px 0 rgba(0, 0, 0, 0.8),
          -1px 1px 0 rgba(0, 0, 0, 0.8),
          1px 1px 0 rgba(0, 0, 0, 0.8),
          0 0 4px rgba(0, 0, 0, 0.9);
      }

      .hint {
        font-size: 12px;
        color: rgba(233, 237, 245, 0.75);
        white-space: nowrap;
      }

      .back {
        transform: rotateY(180deg);
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        background: linear-gradient(180deg, #1e2d3d 0%, #15202b 100%);
      }

      .back h2 {
        margin: 0;
        font-size: 17px;
        text-align: center;
        color: var(--text);
      }

      .back .def {
        margin: 0;
        color: var(--text);
        font-size: 14px;
        text-align: left;
      }

      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        color: rgba(233, 237, 245, 0.7);
        font-size: 12px;
      }

      .tag {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
      }

      .flipBtn {
        width: 100%;
        height: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        text-align: left;
        border-radius: var(--radius);
      }

      .flipBtn:focus-visible {
        outline: 3px solid var(--ring);
        outline-offset: 3px;
      }

      @media (max-width: 520px) {
        .card {
          min-height: 300px;
        }
      }
    </style>
  </head>

  <body>
    <div class="bg-media" aria-hidden="true"><img class="bg-image" src="../assets/koed-bg-16x9.png" alt="" fetchpriority="high" decoding="async"></div>

    <div class="page-shell">
    <header>
      <a class="back-link" href="index.html">Tilbage</a>
      <h1>Ordkort – tilberedte kødtyper</h1>
      <p>Ordet på kortet læses op, når du klikker på kortet</p>
    </header>

    <main>
      <section class="grid" id="grid" aria-label="Ordkort"></section>
    </main>

    <script>
      const assetFolder = "../tilberedte-koedtyper/";
      const audioPlayer = new Audio();

      function getAudioFile(item) {
        if (item.audio) return item.audio;
        return item.img.replace(/\.(jpg|png|jpeg)$/i, ".mp3");
      }

      const cards = [
        {
          term: "andesteg",
          img: "Andesteg.jpg",
          def: "Andesteg er stegt andekød, som ofte serveres med kartofler, brun sovs og rødkål. Retten er især kendt fra danske højtider.",
          tags: ["fjerkræ", "højtid"],
        },
        {
          term: "entrecôte",
          img: "Entrecôte.jpg",
          def: "Entrecôte er en bøf skåret af oksekød. Kødet er mørt og saftigt og steges ofte på pande eller grill.",
          tags: ["oksekød", "bøf"],
        },
        {
          term: "flæskesteg",
          img: "Flæskesteg.png",
          def: "Flæskesteg er stegt svinekød med sprød svær. Den serveres ofte med kartofler, brun sovs og rødkål.",
          tags: ["svinekød", "sprød svær"],
        },
        {
          term: "forloren hare",
          img: "Forloren-hare.png",
          def: "Forloren hare er en ovnstegt farsret, som minder om et farsbrød. Den serveres typisk med kartofler, brun sovs og surt tilbehør.",
          tags: ["farsret", "ovnret"],
        },
        {
          term: "frikadeller",
          img: "Frikadeller.jpg",
          def: "Frikadeller er stegte boller af hakket kød. De spises ofte med kartofler, sovs eller som pålæg på rugbrød.",
          tags: ["hakket kød", "stegt"],
        },
        {
          term: "grillpølser",
          img: "Grillpølser.png",
          def: "Grillpølser er pølser, der tilberedes på grill eller pande. De serveres ofte med brød, kartoffelsalat eller tilbehør fra grillen.",
          tags: ["pølser", "grill"],
        },
        {
          term: "hakkebøffer",
          img: "Hakkebøffer.jpg",
          def: "Hakkebøffer er bøffer lavet af hakket kød, ofte oksekød. De serveres tit med kartofler og brun sovs.",
          tags: ["oksekød", "hakket kød"],
        },
        {
          term: "kalvesteg",
          img: "Kalvesteg.jpg",
          def: "Kalvesteg er en steg lavet af kalvekød. Kødet er mørt og bruges ofte til ovnretter med sovs og grøntsager.",
          tags: ["kalvekød", "steg"],
        },
        {
          term: "karbonader",
          img: "Karbonader.png",
          def: "Karbonader er panerede og stegte stykker af hakket kød. De serveres ofte med kartofler, brun sovs og stuvede grøntsager.",
          tags: ["paneret", "hakket kød"],
        },
        {
          term: "kebab",
          img: "Kebab.jpg",
          def: "Kebab er krydret kød, som ofte serveres i brød eller med salat, dressing og tilbehør. Kødet kan være stegt på spyd eller formet som små kødstykker.",
          tags: ["krydret", "serveres med brød"],
        },
        {
          term: "kyllingefileter",
          img: "Kyllingefileter.jpg",
          def: "Kyllingefileter er møre stykker kyllingekød uden ben. De steges ofte på pande eller i ovn og serveres med kartofler, ris eller salat.",
          tags: ["kylling", "magert kød"],
        },
        {
          term: "kødsovs",
          img: "Kødsovs.jpg",
          def: "Kødsovs er en sauce med hakket kød, ofte oksekød, og tomat. Den bruges tit sammen med pasta som for eksempel spaghetti eller penne.",
          tags: ["hakket kød", "pastaret"],
        },
        {
          term: "lammekoteletter",
          img: "Lammekoteletter.jpg",
          def: "Lammekoteletter er skiver af lammekød med ben. De steges eller grilles ofte og serveres med kartofler, salat eller grøntsager.",
          tags: ["lammekød", "med ben"],
        },
        {
          term: "medisterpølse",
          img: "Medisterpølse.png",
          def: "Medisterpølse er en krydret pølse af hakket svinekød. Den steges ofte på pande og serveres med kartofler, sovs eller stuvet tilbehør.",
          tags: ["svinekød", "pølse"],
        },
        {
          term: "osso buco",
          img: "Osso-buco.png",
          def: "Osso buco er en ret med skiver af kalveskank, som braiseres langsomt. Retten serveres ofte med sauce, grøntsager og ris eller kartoffelmos.",
          tags: ["kalvekød", "langtidsstegt"],
        },
        {
          term: "pulled pork",
          img: "Pulled-pork.jpg",
          def: "Pulled pork er svinekød, som er tilberedt så længe, at det kan trækkes fra hinanden i strimler. Det serveres ofte i burgerboller eller wraps.",
          tags: ["svinekød", "trevlet kød"],
        },
        {
          term: "roastbeef",
          img: "Roastbeef.jpg",
          def: "Roastbeef er stegt oksekød, som ofte skæres i tynde skiver. Det kan serveres både varmt som hovedret og koldt som pålæg.",
          tags: ["oksekød", "tynde skiver"],
        },
        {
          term: "rullepølse",
          img: "Rullepølse.png",
          def: "Rullepølse er et stykke krydret og sammenrullet kød, som koges. Det bruges ofte som pålæg på rugbrød.",
          tags: ["pålæg", "sammenrullet kød"],
        },
        {
          term: "røget skinke",
          img: "Roegt-skinke.jpg",
          def: "Røget skinke er skinke, som er røget for at få en særlig smag. Den bruges ofte som pålæg, men kan også serveres som en del af et måltid.",
          tags: ["pålæg", "røget"],
        },
        {
          term: "spegepølse",
          img: "Spegepølse.png",
          def: "Spegepølse er en krydret og tørret pølse, som ofte skæres i skiver og bruges som pålæg på rugbrød eller franskbrød.",
          tags: ["pålæg", "tørret pølse"],
        },
        {
          term: "stegt kylling",
          img: "Stegt-kylling.jpg",
          def: "Stegt kylling er kylling, der er tilberedt i ovn eller på pande, indtil kødet er mørt og skindet gyldent. Den serveres ofte med kartofler og grøntsager.",
          tags: ["kylling", "ovnret"],
        },
        {
          term: "varm leverpostej",
          img: "Varm-leverposteg.png",
          audio: "Varm-leverpostej.mp3",
          def: "Varm leverpostej er en lun ret lavet af leverfars. Den serveres ofte med bacon, champignon og rugbrød.",
          tags: ["lever", "lun ret"],
        },
        {
          term: "wiener schnitzel",
          img: "Wiener-Schnitzel.jpg",
          audio: "Wienerschnitzel.mp3",
          def: "Wiener schnitzel er et tyndt stykke kalvekød, som er paneret og stegt. Den serveres ofte med kartofler, citron og ærter.",
          tags: ["kalvekød", "paneret"],
        }
      ];

      const grid = document.getElementById("grid");

      function capitalizeFirst(text) {
        if (!text) return "";
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function createCard(item) {
        const titleText = capitalizeFirst(item.term);
        const defText = item.def || "";
        const audioFile = getAudioFile(item);

        const card = document.createElement("article");
        card.className = "card";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "flipBtn";
        btn.setAttribute("aria-label", `Vend ordkort: ${titleText}`);
        btn.dataset.audio = encodeURI(assetFolder + audioFile);

        const inner = document.createElement("div");
        inner.className = "inner";

        const front = document.createElement("div");
        front.className = "face front";

        const imgwrap = document.createElement("div");
        imgwrap.className = "imgwrap";

        const img = document.createElement("img");
        img.alt = titleText;
        img.src = encodeURI(assetFolder + item.img);
        img.loading = "eager";
        imgwrap.appendChild(img);

        const label = document.createElement("div");
        label.className = "label";

        const strong = document.createElement("strong");
        strong.textContent = titleText;

        const hint = document.createElement("span");
        hint.className = "hint";
        hint.textContent = "Klik for forklaring";

        label.appendChild(strong);
        label.appendChild(hint);

        front.appendChild(imgwrap);
        front.appendChild(label);

        const back = document.createElement("div");
        back.className = "face back";

        const h2 = document.createElement("h2");
        h2.textContent = titleText;

        const def = document.createElement("p");
        def.className = "def";
        def.textContent = defText;

        const meta = document.createElement("div");
        meta.className = "meta";

        (item.tags || []).forEach((t) => {
          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = capitalizeFirst(t);
          meta.appendChild(tag);
        });

        back.appendChild(h2);
        back.appendChild(def);
        back.appendChild(meta);

        inner.appendChild(front);
        inner.appendChild(back);

        btn.appendChild(inner);
        card.appendChild(btn);

        const toggle = () => {
          card.classList.toggle("is-flipped");
          if (btn.dataset.audio) {
            audioPlayer.src = btn.dataset.audio;
            audioPlayer.currentTime = 0;
            audioPlayer.play().catch(() => {});
          }
        };

        btn.addEventListener("click", toggle);
        btn.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            toggle();
          }
        });

        return card;
      }

      cards.forEach((item) => grid.appendChild(createCard(item)));
    </script>
    </div>
  </body>
</html>
