<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vendespil om tilberedte kødtyper</title>
    <link rel="preload" href="koed-bg-16x9.png" as="image" />
    <style>
      :root {
        --bg: #f7fbff;
        --panel: #ffffff;
        --panel2: #f2f6ff;
        --text: #1f2430;
        --muted: #5a6270;
        --shadow: 0 20px 40px rgba(16, 24, 40, 0.18);
        --radius: 20px;
        --gap: 12px;
        --card-radius: 18px;
        --card-border: rgba(60, 80, 120, 0.18);
        --accent: #c47b4a;
        --accent-strong: #a85c2e;
      }

      html {
        margin: 0;
        min-height: 100%;
        overflow-y: scroll;
        scrollbar-gutter: stable;
        background: #0f1b24;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f1b24;
        font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: #fff;
        position: relative;
      }
      .bg-media {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: #0f1b24 url('../assets/koed-bg-16x9.png') center/cover no-repeat;
        overflow: hidden;
      }
      .page-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app {
        position: relative;
        z-index: 1;
        min-height: calc(100vh - 44px);
        width: min(980px, 100%);
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(44, 66, 110, 0.18);
        box-shadow: var(--shadow);
        border-radius: var(--radius);
        overflow: hidden;
      }

      header {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        align-items: center;
        justify-content: space-between;
        padding: 16px 18px;
        background: linear-gradient(90deg, #ffe8d9, #ffdfc9, #f5e6dc);
        border-bottom: 1px solid rgba(44, 66, 110, 0.14);
      }

      header h1 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0.2px;
        font-weight: 650;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        background: #ffffff;
        border: 1px solid rgba(44, 66, 110, 0.18);
        box-shadow: 0 6px 14px rgba(30, 50, 90, 0.08);
      }

      .btn {
        cursor: pointer;
        border: 1px solid rgba(196, 123, 74, 0.45);
        background: linear-gradient(180deg, #d99a6a, #c47b4a);
        color: #ffffff;
        padding: 9px 12px;
        border-radius: 12px;
        font-weight: 600;
        transition: transform 0.08s ease, background 0.15s ease,
          border-color 0.15s ease;
        user-select: none;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn:hover {
        background: linear-gradient(180deg, #c47b4a, #a85c2e);
        border-color: rgba(168, 92, 46, 0.55);
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(71, 95, 140, 0.25);
        background: linear-gradient(180deg, #ffffff, #eef6ff);
        box-shadow: 0 6px 14px rgba(30, 50, 90, 0.12);
      }
      .back-link:hover {
        background: linear-gradient(180deg, #ffffff, #dff4ff);
      }

      .content {
        position: relative;
        z-index: 1;
        padding: 16px;
      }
      .audio-note {
        margin: 0 0 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(44, 66, 110, 0.18);
        color: var(--text);
        font-weight: 600;
      }

      .grid {
        display: grid;
        gap: var(--gap);
        grid-template-columns: repeat(4, 1fr);
        min-height: 50vh;
      }

      @media (min-width: 720px) {
        .grid {
          grid-template-columns: repeat(6, 1fr);
        }
      }
      @media (max-width: 420px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      .card {
        position: relative;
        aspect-ratio: 1 / 1;
        border-radius: var(--card-radius);
        perspective: 1000px;
        transition: transform 0.18s ease;
      }
      .card:hover {
        transform: translateY(-3px);
      }

      .inner {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        transform-style: preserve-3d;
        transition: transform 220ms ease;
        box-shadow: 0 16px 28px rgba(30, 50, 90, 0.2);
      }

      .card.flipped .inner {
        transform: rotateY(180deg);
      }
      .card.matched {
        opacity: 0.78;
      }
      .card.matched .inner {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        backface-visibility: hidden;
        overflow: hidden;
        border: 1px solid var(--card-border);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
      }

      .front {
        background: linear-gradient(135deg, #8b4513, #a0522d, #6b3410);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .front::before {
        content: "";
        width: 0;
        height: 0;
      }

      .back {
        transform: rotateY(180deg);
        background: #ffffff;
      }

      .back img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.12) contrast(1.05);
      }

      .toast {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: #ffffff;
        border: 1px solid rgba(44, 66, 110, 0.18);
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toast strong {
        color: var(--text);
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="bg-media" aria-hidden="true"></div>

    <div class="page-shell">
    <div class="app">
      <header>
        <a class="back-link" href="index.html">Tilbage</a>
        <h1>Vendespil om tilberedte kødtyper</h1>

        <div class="stats">
          <div class="pill">Træk: <strong id="moves">0</strong></div>
          <div class="pill">
            Fundet: <strong id="matches">0</strong> /
            <strong id="totalPairs">0</strong>
          </div>
          <div class="pill">Tid: <strong id="time">00:00</strong></div>
          <button class="btn" id="restartBtn" type="button">
            Start forfra
          </button>
        </div>
      </header>

      <div class="content">
        <p class="audio-note">
          Spillet understøttes af lyd: Når du klikker på en brik, hører du
          navnet på det, der er på billedet.
        </p>
        <div class="grid" id="grid"></div>

        <div class="toast" id="status">
          <div id="winMsg" class="hidden">
            <strong>Du vandt!</strong> 🎉
          </div>
        </div>
      </div>
    </div>

    <script>
      const IMAGE_FILES = [
        "../tilberedte-koedtyper/Andesteg.jpg",
        "../tilberedte-koedtyper/Entrecôte.jpg",
        "../tilberedte-koedtyper/Flæskesteg.png",
        "../tilberedte-koedtyper/Forloren-hare.png",
        "../tilberedte-koedtyper/Frikadeller.jpg",
        "../tilberedte-koedtyper/Grillpølser.png",
        "../tilberedte-koedtyper/Hakkebøffer.jpg",
        "../tilberedte-koedtyper/Kalvesteg.jpg",
        "../tilberedte-koedtyper/Karbonader.png",
        "../tilberedte-koedtyper/Kebab.jpg",
        "../tilberedte-koedtyper/Kyllingefileter.jpg",
        "../tilberedte-koedtyper/Kødsovs.jpg",
        "../tilberedte-koedtyper/Lammekoteletter.jpg",
        "../tilberedte-koedtyper/Medisterpølse.png",
        "../tilberedte-koedtyper/Osso-buco.png",
        "../tilberedte-koedtyper/Pulled-pork.jpg",
        "../tilberedte-koedtyper/Roastbeef.jpg",
        "../tilberedte-koedtyper/Rullepølse.png",
        "../tilberedte-koedtyper/Roegt-skinke.jpg",
        "../tilberedte-koedtyper/Spegepølse.png",
        "../tilberedte-koedtyper/Stegt-kylling.jpg",
        "../tilberedte-koedtyper/Varm-leverposteg.png",
        "../tilberedte-koedtyper/Wiener-Schnitzel.jpg",
      ];

      const grid = document.getElementById("grid");
      const movesEl = document.getElementById("moves");
      const matchesEl = document.getElementById("matches");
      const totalPairsEl = document.getElementById("totalPairs");
      const timeEl = document.getElementById("time");
      const restartBtn = document.getElementById("restartBtn");
      const winMsg = document.getElementById("winMsg");
      const audioPlayer = new Audio();

      let deck = [];
      let first = null;
      let second = null;
      let lock = false;

      let moves = 0;
      let matches = 0;

      let timerId = null;
      let startedAt = null;

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        return `${pad2(m)}:${pad2(s)}`;
      }

      function startTimerIfNeeded() {
        if (timerId) return;
        startedAt = Date.now();
        timerId = setInterval(() => {
          timeEl.textContent = formatTime(Date.now() - startedAt);
        }, 250);
      }

      function stopTimer() {
        if (!timerId) return;
        clearInterval(timerId);
        timerId = null;
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function buildDeck() {
        const base = IMAGE_FILES.map((src, idx) => ({
          id: idx + 1,
          src,
        }));

        const doubled = [];
        for (const item of base) {
          doubled.push({ ...item, key: crypto.randomUUID() });
          doubled.push({ ...item, key: crypto.randomUUID() });
        }

        return shuffle(doubled);
      }

      function setStats() {
        movesEl.textContent = String(moves);
        matchesEl.textContent = String(matches);
        totalPairsEl.textContent = String(IMAGE_FILES.length);
      }

      function resetState() {
        deck = buildDeck();
        first = null;
        second = null;
        lock = false;
        moves = 0;
        matches = 0;
        winMsg.classList.add("hidden");

        stopTimer();
        timeEl.textContent = "00:00";
        startedAt = null;

        setStats();
        render();
      }

      function getAudioSrc(imageSrc) {
        if (imageSrc.includes("Varm-leverposteg")) {
          return encodeURI("../tilberedte-koedtyper/Varm-leverpostej.mp3");
        }
        if (imageSrc.includes("Wiener-Schnitzel")) {
          return encodeURI("../tilberedte-koedtyper/Wienerschnitzel.mp3");
        }
        return encodeURI(imageSrc.replace(/\.(jpg|png)$/i, ".mp3"));
      }

      function render() {
        grid.innerHTML = "";

        for (let i = 0; i < deck.length; i++) {
          const cardData = deck[i];

          const card = document.createElement("button");
          card.type = "button";
          card.className = "card";
          card.setAttribute("aria-label", "Kort");
          card.dataset.index = String(i);
          card.dataset.id = String(cardData.id);
          card.dataset.audio = getAudioSrc(cardData.src);

          const inner = document.createElement("div");
          inner.className = "inner";

          const front = document.createElement("div");
          front.className = "face front";

          const back = document.createElement("div");
          back.className = "face back";

          const img = document.createElement("img");
          img.src = encodeURI(cardData.src);
          img.alt = "Billede";
          img.loading = i < 10 ? "eager" : "lazy";
          back.appendChild(img);

          inner.appendChild(front);
          inner.appendChild(back);
          card.appendChild(inner);

          card.addEventListener("click", onCardClick);
          grid.appendChild(card);
        }
      }

      function getCardElByIndex(index) {
        return grid.querySelector(`.card[data-index="${index}"]`);
      }

      function flip(cardEl) {
        cardEl.classList.add("flipped");
        cardEl.disabled = true;
      }

      function unflip(cardEl) {
        cardEl.classList.remove("flipped");
        cardEl.disabled = false;
      }

      function markMatched(cardEl) {
        cardEl.classList.add("matched");
        cardEl.disabled = true;
      }

      function playCardAudio(cardEl) {
        const src = cardEl.dataset.audio;
        if (!src) return;
        audioPlayer.src = src;
        audioPlayer.load();
        audioPlayer.currentTime = 0;
        audioPlayer.play().catch(() => {});
      }

      async function onCardClick(e) {
        const cardEl = e.currentTarget;
        if (lock) return;
        if (cardEl.classList.contains("matched")) return;

        startTimerIfNeeded();

        const index = Number(cardEl.dataset.index);
        const id = Number(cardEl.dataset.id);

        if (first && first.index === index) return;

        flip(cardEl);
        playCardAudio(cardEl);

        if (!first) {
          first = { index, id };
          return;
        }

        second = { index, id };
        moves += 1;
        setStats();

        if (first.id === second.id) {
          const a = getCardElByIndex(first.index);
          const b = getCardElByIndex(second.index);
          markMatched(a);
          markMatched(b);

          matches += 1;
          setStats();

          first = null;
          second = null;

          if (matches === IMAGE_FILES.length) {
            stopTimer();
            winMsg.classList.remove("hidden");
          }
          return;
        }

        lock = true;
        await new Promise((r) => setTimeout(r, 650));

        const a = getCardElByIndex(first.index);
        const b = getCardElByIndex(second.index);
        if (a) unflip(a);
        if (b) unflip(b);

        first = null;
        second = null;
        lock = false;
      }

      function preloadImages() {
        for (const src of IMAGE_FILES) {
          const im = new Image();
          im.src = src;
        }
      }

      restartBtn.addEventListener("click", resetState);

      preloadImages();
      resetState();
    </script>
    </div>
  </body>
</html>
